name: Windows EXE

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e . pyinstaller

      - name: Build EXE
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build_windows.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: compressPPTX-windows-exe
          path: dist/compressPPTX.exe

      - name: Upload release asset
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/compressPPTX.exe
